<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Applicants – Full Export</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; color: #222; padding: 32px 24px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  p.sub { font-size: 14px; color: #666; margin-bottom: 28px; }

  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px; }
  .card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .card .value { font-size: 24px; font-weight: 600; color: #111; }
  .card .value.green { color: #1a7a4a; }
  .card .value.red { color: #c0392b; }
  .card .value.blue { color: #1a5fa8; }

  #progress-wrap { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; margin-bottom: 24px; }
  #progress-wrap h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .bar-bg { background: #eee; border-radius: 6px; height: 12px; overflow: hidden; margin-bottom: 10px; }
  .bar-fill { background: #1a5fa8; height: 100%; border-radius: 6px; width: 0%; transition: width 0.2s; }
  #progress-text { font-size: 13px; color: #555; }
  #log { font-size: 12px; color: #888; margin-top: 10px; max-height: 100px; overflow-y: auto; line-height: 1.6; }

  .btns { display: flex; gap: 10px; flex-wrap: wrap; }
  button { padding: 10px 22px; border-radius: 8px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #btn-fetch { background: #1a5fa8; color: #fff; }
  #btn-xlsx { background: #1a7a4a; color: #fff; }
  #btn-csv  { background: #555; color: #fff; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; }
  th { background: #f0f4fa; border-bottom: 2px solid #c8d6e8; padding: 8px 10px; text-align: left; font-weight: 600; white-space: nowrap; }
  td { border-bottom: 1px solid #eee; padding: 6px 10px; white-space: nowrap; }
  tr:hover td { background: #f9f9f9; }
  .stage-Joined      { background: #d4edda; color: #155724; border-radius: 4px; padding: 2px 7px; }
  .stage-Rejected    { background: #f8d7da; color: #721c24; border-radius: 4px; padding: 2px 7px; }
  .stage-Withdrew    { background: #fff3cd; color: #856404; border-radius: 4px; padding: 2px 7px; }
  .stage-Applied     { background: #e2e3e5; color: #383d41; border-radius: 4px; padding: 2px 7px; }
  .stage-offer       { background: #cce5ff; color: #004085; border-radius: 4px; padding: 2px 7px; }
  .stage-inprogress  { background: #d1ecf1; color: #0c5460; border-radius: 4px; padding: 2px 7px; }
  #preview-section { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; margin-top: 24px; overflow-x: auto; display: none; }
  #preview-section h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
</style>
</head>
<body>

<h1>HR Applicants — Full Dataset Export</h1>
<p class="sub">Fetches all 3,000 records (30 pages) from the Mosaic Fellowship HR API and exports to Excel or CSV.</p>

<div class="cards">
  <div class="card"><div class="label">Total records</div><div class="value blue" id="stat-total">—</div></div>
  <div class="card"><div class="label">Joined</div><div class="value green" id="stat-joined">—</div></div>
  <div class="card"><div class="label">Rejected</div><div class="value red" id="stat-rejected">—</div></div>
  <div class="card"><div class="label">In pipeline</div><div class="value" id="stat-pipeline">—</div></div>
</div>

<div id="progress-wrap">
  <h2>Fetch progress</h2>
  <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
  <div id="progress-text">Ready — click "Fetch all pages" to begin.</div>
  <div id="log"></div>
</div>

<div class="btns">
  <button id="btn-fetch" onclick="fetchAll()">Fetch all pages</button>
  <button id="btn-xlsx" onclick="exportXLSX()" disabled>Download Excel (.xlsx)</button>
  <button id="btn-csv"  onclick="exportCSV()"  disabled>Download CSV</button>
</div>

<div id="preview-section">
  <h2>Preview — first 50 records</h2>
  <div id="table-wrap"></div>
</div>

<script>
const API = 'https://mosaicfellowship.in/api/data/hr/applicants';
const TOTAL_PAGES = 30;
const COLS = [
  'applicant_id','department','role','source','city','experience_level','education',
  'apply_date','current_stage','phone_screen_score','technical_score','culture_fit_score',
  'hiring_manager_score','days_apply_to_phone','days_phone_to_tech','days_tech_to_culture',
  'days_culture_to_hm','days_hm_to_offer','days_offer_to_accept','days_accept_to_join',
  'total_process_days','expected_ctc','offered_ctc','recruiter_notes',
  'is_diversity_candidate','referral_employee_id'
];

let allData = [];

function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML += msg + '<br>';
  el.scrollTop = el.scrollHeight;
}

function setBar(pct) {
  document.getElementById('bar').style.width = pct + '%';
}

function setProgress(txt) {
  document.getElementById('progress-text').textContent = txt;
}

function stageClass(stage) {
  if (!stage) return '';
  if (stage === 'Joined') return 'stage-Joined';
  if (stage === 'Rejected') return 'stage-Rejected';
  if (stage === 'Withdrew') return 'stage-Withdrew';
  if (stage === 'Applied') return 'stage-Applied';
  if (stage.includes('Offer')) return 'stage-offer';
  return 'stage-inprogress';
}

function updateStats(data) {
  document.getElementById('stat-total').textContent = data.length.toLocaleString();
  document.getElementById('stat-joined').textContent = data.filter(d => d.current_stage === 'Joined').length.toLocaleString();
  document.getElementById('stat-rejected').textContent = data.filter(d => d.current_stage === 'Rejected').length.toLocaleString();
  const terminal = ['Joined','Rejected','Withdrew'];
  document.getElementById('stat-pipeline').textContent = data.filter(d => !terminal.includes(d.current_stage)).length.toLocaleString();
}

async function fetchAll() {
  document.getElementById('btn-fetch').disabled = true;
  allData = [];
  document.getElementById('log').innerHTML = '';

  for (let page = 1; page <= TOTAL_PAGES; page++) {
    try {
      const resp = await fetch(`${API}?page=${page}&limit=100`);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const json = await resp.json();
      allData = allData.concat(json.data || []);
      const pct = Math.round((page / TOTAL_PAGES) * 100);
      setBar(pct);
      setProgress(`Fetched page ${page} of ${TOTAL_PAGES} — ${allData.length} records so far`);
      log(`Page ${page}: +${(json.data||[]).length} records`);
      updateStats(allData);
    } catch(e) {
      log(`Page ${page} failed: ${e.message}`);
    }
  }

  setProgress(`Done! ${allData.length} records fetched across ${TOTAL_PAGES} pages.`);
  document.getElementById('btn-xlsx').disabled = false;
  document.getElementById('btn-csv').disabled = false;
  renderPreview();
}

function renderPreview() {
  const section = document.getElementById('preview-section');
  section.style.display = 'block';
  const preview = allData.slice(0, 50);
  let html = '<table><thead><tr>';
  const visibleCols = ['applicant_id','department','role','city','experience_level','current_stage','expected_ctc','total_process_days'];
  visibleCols.forEach(c => { html += `<th>${c.replace(/_/g,' ')}</th>`; });
  html += '</tr></thead><tbody>';
  preview.forEach(row => {
    html += '<tr>';
    visibleCols.forEach(c => {
      let val = row[c] == null ? '' : row[c];
      if (c === 'current_stage') {
        val = `<span class="${stageClass(val)}">${val}</span>`;
      } else if (c === 'expected_ctc' && val !== '') {
        val = '₹' + Number(val).toLocaleString('en-IN', {maximumFractionDigits: 0});
      }
      html += `<td>${val}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
}

function exportXLSX() {
  if (!allData.length) return;
  const wsData = [COLS, ...allData.map(r => COLS.map(c => r[c] == null ? '' : r[c]))];
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  ws['!cols'] = COLS.map(c => ({ wch: Math.max(c.length, 14) }));

  const headerRange = XLSX.utils.decode_range(ws['!ref']);
  for (let col = headerRange.s.c; col <= headerRange.e.c; col++) {
    const addr = XLSX.utils.encode_cell({ r: 0, c: col });
    if (!ws[addr]) continue;
    ws[addr].s = { font: { bold: true }, fill: { fgColor: { rgb: 'E8F0FE' } } };
  }

  XLSX.utils.book_append_sheet(wb, ws, 'Applicants');

  const stageCounts = {};
  allData.forEach(r => { stageCounts[r.current_stage] = (stageCounts[r.current_stage]||0)+1; });
  const summaryData = [['Stage','Count'], ...Object.entries(stageCounts).sort((a,b)=>b[1]-a[1])];
  const ws2 = XLSX.utils.aoa_to_sheet(summaryData);
  ws2['!cols'] = [{ wch: 20 }, { wch: 10 }];
  XLSX.utils.book_append_sheet(wb, ws2, 'Summary by Stage');

  const deptCounts = {};
  allData.forEach(r => { deptCounts[r.department] = (deptCounts[r.department]||0)+1; });
  const deptData = [['Department','Count'], ...Object.entries(deptCounts).sort((a,b)=>b[1]-a[1])];
  const ws3 = XLSX.utils.aoa_to_sheet(deptData);
  ws3['!cols'] = [{ wch: 20 }, { wch: 10 }];
  XLSX.utils.book_append_sheet(wb, ws3, 'Summary by Dept');

  XLSX.writeFile(wb, 'hr_applicants_full.xlsx');
}

function exportCSV() {
  if (!allData.length) return;
  const rows = [COLS.join(','), ...allData.map(r =>
    COLS.map(c => {
      const v = r[c] == null ? '' : String(r[c]);
      return v.includes(',') || v.includes('"') ? `"${v.replace(/"/g,'""')}"` : v;
    }).join(',')
  )];
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'hr_applicants_full.csv';
  a.click();
}
</script>
</body>
</html>
